<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f8f7f5">
    <title>World Cup broadcasts in Finland</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <h1 class="sr-only">World Cup</h1>
        <img class="app-banner" src="img/wc-banner.png" alt="">
        <div class="watch-menu">
          <button class="watch-menu-button" type="button" aria-expanded="false" aria-controls="watchMenu">
            <span class="sr-only">Open watch links</span>
            <img src="img/play.png" alt="" aria-hidden="true">
          </button>
          <div id="watchMenu" class="watch-menu-panel" hidden>
            <a class="watch-menu-link" href="https://areena.yle.fi/tv/ohjelmat/57-dJ7koL672" target="_blank" rel="noopener noreferrer">
              <img class="watch-menu-logo watch-menu-logo-yle" src="img/yle-logo.png" alt="">
              <span class="watch-menu-text">
                <span class="watch-menu-title">Yle Areena</span>
                <span class="watch-menu-subtitle">Lives, re-runs &amp; highlights</span>
              </span>
              <img class="watch-menu-external" src="img/new-tab.png" alt="" aria-hidden="true">
            </a>
            <a class="watch-menu-link" href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/highlights" target="_blank" rel="noopener noreferrer">
              <img class="watch-menu-logo" src="img/fifa-logo.png" alt="">
              <span class="watch-menu-text">
                <span class="watch-menu-title">FIFA.com</span>
                <span class="watch-menu-subtitle">Highlights</span>
              </span>
              <img class="watch-menu-external" src="img/new-tab.png" alt="" aria-hidden="true">
            </a>
          </div>
        </div>
      </header>

      <div class="sticky-controls">
        <nav class="filters" aria-label="Broadcast filters">
          <button class="filter-pill is-selected" type="button" data-filter="all">All</button>
          <button class="filter-pill" type="button" data-filter="live">Live matches</button>
          <button class="filter-pill" type="button" data-filter="highlights">Highlights</button>
          <button class="filter-pill" type="button" data-filter="rerun">Re-runs</button>
        </nav>

        <nav class="view-toggle" aria-label="Date view">
          <button class="view-button is-selected" type="button" data-view="upcoming">Upcoming</button>
          <button class="view-button" type="button" data-view="past">Past</button>
        </nav>
      </div>

      <section id="feed" class="feed" aria-live="polite">
        <p class="loading">Loading broadcasts...</p>
      </section>

      <footer class="calendar-note">
        <span id="buildMarker" class="build-marker">Build local</span>
      </footer>
    </main>

    <template id="dayTemplate">
      <section class="day-group">
        <div class="day-heading">
          <h2></h2>
          <time></time>
        </div>
        <button class="finished-today-toggle" type="button" hidden>
          <span class="finished-today-label">show finished today</span>
        </button>
        <div class="cards"></div>
      </section>
    </template>

    <template id="cardTemplate">
      <article class="broadcast-card">
        <div class="card-top">
          <time class="start-time"></time>
          <div class="details">
            <div class="detail-topline">
              <p class="type-label"></p>
              <span class="channel-badge"></span>
            </div>
            <h3></h3>
            <p class="meta"></p>
          </div>
        </div>
        <div class="card-actions">
          <label class="watched">
            <input type="checkbox">
            <span>Watched</span>
          </label>
          <button class="calendar-button" type="button">
            <span aria-hidden="true">▣</span>
            <span>Add to Calendar</span>
          </button>
        </div>
      </article>
    </template>

    <script src="app.js?v=dev-20260616-4" defer></script>
  </body>
</html>
